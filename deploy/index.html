<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiftly - Login/Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Swiftly</h1>
                <p>Fast. Reliable. Professional.</p>
            </div>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="container">
                <div class="auth-container">
                    <div class="auth-tabs">
                        <button class="tab-btn active" data-tab="login">Login</button>
                        <button class="tab-btn" data-tab="register">Register</button>
                    </div>

                    <!-- Login Form -->
                    <div class="auth-form active" id="login-form">
                        <h2>Welcome Back</h2>
                        <form id="loginForm">
                            <div class="form-group">
                                <label for="loginEmail">Email Address</label>
                                <input type="email" id="loginEmail" name="email" required placeholder="john@example.com">
                            </div>
                            <div class="form-group">
                                <label for="loginPassword">Password</label>
                                <input type="password" id="loginPassword" name="password" required placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn btn-primary">Login</button>
                        </form>
                        <p class="auth-switch">Don't have an account? <a href="#" data-tab="register">Register here</a></p>
                    </div>

                    <!-- Register Form -->
                    <div class="auth-form" id="register-form">
                        <h2>Create Account</h2>
                        <form id="registerForm">
                            <div class="form-group">
                                <label for="registerName">Full Name</label>
                                <input type="text" id="registerName" name="name" required placeholder="John Doe">
                            </div>
                            <div class="form-group">
                                <label for="registerEmail">Email Address</label>
                                <input type="email" id="registerEmail" name="email" required placeholder="john@example.com">
                            </div>
                            <div class="form-group">
                                <label for="registerPhone">Phone Number</label>
                                <input type="tel" id="registerPhone" name="phone" required placeholder="+1234567890">
                            </div>
                            <div class="form-group">
                                <label for="registerPassword">Password</label>
                                <input type="password" id="registerPassword" name="password" required placeholder="••••••••">
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn btn-primary">Register</button>
                        </form>
                        <p class="auth-switch">Already have an account? <a href="#" data-tab="login">Login here</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Swiftly. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
