<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiftly - My Job Requests</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Swiftly</h1>
                <p>Fast. Reliable. Professional.</p>
            </div>
            <nav class="user-nav">
                <button class="btn btn-outline" onclick="goHome()">← Back to Categories</button>
            </nav>
        </div>
    </header>

    <main>
        <section class="job-requests-section">
            <div class="container">
                <div class="page-header">
                    <h2>My Job Requests</h2>
                    <p>Track and manage your service requests</p>
                </div>

                <div class="job-requests-grid" id="jobRequestsGrid">
                    <!-- Job requests will be dynamically loaded here -->
                </div>

                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">📋</div>
                    <h3>No Active Job Requests</h3>
                    <p>You haven't submitted any job requests yet. Start by selecting a service category.</p>
                    <button class="btn btn-primary" onclick="goToCategories()">Browse Services</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Swiftly. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // Hardcoded job requests data (ready for Firestore migration)
        const jobRequests = [
            {
                id: 'job_001',
                category: 'Kitchen',
                subcategory: 'kitchen',
                description: 'Complete kitchen renovation with new cabinets and countertops',
                urgency: 'medium',
                budget: '5000-10000',
                location: '123 Main St, City',
                status: 'pending_responses',
                createdAt: new Date('2024-01-15'),
                responses: [
                    {
                        contractorId: 1,
                        contractorName: 'John Smith',
                        businessName: 'Smith Kitchen Solutions',
                        response: 'I can complete this project in 3-4 weeks. Estimated cost: $8,500. Includes custom cabinets and quartz countertops.',
                        estimatedPrice: 8500,
                        timeline: '3-4 weeks',
                        availability: 'available',
                        respondedAt: new Date('2024-01-16')
                    },
                    {
                        contractorId: 2,
                        contractorName: 'Maria Garcia',
                        businessName: 'Garcia Home Improvements',
                        response: 'Available to start next week. Complete renovation for $7,200. Premium materials included.',
                        estimatedPrice: 7200,
                        timeline: '2-3 weeks',
                        availability: 'available',
                        respondedAt: new Date('2024-01-17')
                    }
                ]
            },
            {
                id: 'job_002',
                category: 'Plumbing',
                subcategory: 'leaks',
                description: 'Kitchen sink leak and pipe replacement needed',
                urgency: 'high',
                budget: 'under-500',
                location: '456 Oak Ave, City',
                status: 'pending_responses',
                createdAt: new Date('2024-01-18'),
                responses: [
                    {
                        contractorId: 6,
                        contractorName: 'Mike Wilson',
                        businessName: 'Wilson Plumbing Services',
                        response: 'Emergency service available today. Can fix leak for $350. Parts and labor included.',
                        estimatedPrice: 350,
                        timeline: 'Same day',
                        availability: 'emergency',
                        respondedAt: new Date('2024-01-18')
                    }
                ]
            },
            {
                id: 'job_003',
                category: 'Electrical',
                subcategory: 'lighting',
                description: 'Install new LED lighting fixtures in living room',
                urgency: 'low',
                budget: '1000-2500',
                location: '789 Pine St, City',
                status: 'no_responses',
                createdAt: new Date('2024-01-19'),
                responses: []
            }
        ];

        // Render job requests
        function renderJobRequests() {
            const grid = document.getElementById('jobRequestsGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (jobRequests.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            grid.innerHTML = '';
            
            jobRequests.forEach(job => {
                const jobCard = createJobCard(job);
                grid.appendChild(jobCard);
            });
        }

        // Create job request card
        function createJobCard(job) {
            const card = document.createElement('div');
            card.className = 'job-request-card';
            
            const statusClass = getStatusClass(job.status);
            const statusText = getStatusText(job.status);
            const responseCount = job.responses.length;
            
            card.innerHTML = `
                <div class="job-header">
                    <div class="job-title">
                        <h3>${job.category} - ${job.subcategory}</h3>
                        <span class="job-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="job-date">
                        Posted ${formatDate(job.createdAt)}
                    </div>
                </div>
                
                <div class="job-description">
                    <p>${job.description}</p>
                </div>
                
                <div class="job-details">
                    <div class="detail-item">
                        <strong>Urgency:</strong> ${job.urgency}
                    </div>
                    <div class="detail-item">
                        <strong>Budget:</strong> ${formatBudget(job.budget)}
                    </div>
                    <div class="detail-item">
                        <strong>Location:</strong> ${job.location}
                    </div>
                </div>
                
                <div class="job-responses">
                    <div class="responses-header">
                        <h4>Responses (${responseCount})</h4>
                        ${responseCount > 0 ? `<button class="btn btn-sm btn-outline" onclick="toggleResponses('job_${job.id}')">View Responses</button>` : '<span class="no-responses">No responses yet</span>'}
                    </div>
                    
                    <div class="responses-list" id="responses_job_${job.id}" style="display: none;">
                        ${job.responses.map(response => createResponseHTML(response, job.id)).join('')}
                    </div>
                </div>
                
                <div class="job-actions">
                    ${responseCount > 0 ? `<button class="btn btn-primary" onclick="compareResponses('${job.id}')">Compare Responses</button>` : ''}
                    <button class="btn btn-outline" onclick="editJob('${job.id}')">Edit Request</button>
                    <button class="btn btn-secondary" onclick="cancelJob('${job.id}')">Cancel</button>
                </div>
            `;
            
            return card;
        }

        // Create response HTML
        function createResponseHTML(response, jobId) {
            return `
                <div class="response-card">
                    <div class="response-header">
                        <div class="contractor-info">
                            <strong>${response.contractorName}</strong>
                            <span class="business-name">${response.businessName}</span>
                        </div>
                        <div class="response-meta">
                            <span class="price">$${response.estimatedPrice.toLocaleString()}</span>
                            <span class="timeline">${response.timeline}</span>
                        </div>
                    </div>
                    <div class="response-content">
                        <p>${response.response}</p>
                    </div>
                    <div class="response-actions">
                        <button class="btn btn-sm btn-primary" onclick="selectContractor('${jobId}', ${response.contractorId})">Select This Contractor</button>
                        <button class="btn btn-sm btn-outline" onclick="viewContractorProfile(${response.contractorId})">View Profile</button>
                    </div>
                </div>
            `;
        }

        // Helper functions
        function getStatusClass(status) {
            const classes = {
                'pending_responses': 'status-pending',
                'has_responses': 'status-active',
                'contractor_selected': 'status-selected',
                'in_progress': 'status-progress',
                'completed': 'status-completed',
                'no_responses': 'status-waiting'
            };
            return classes[status] || 'status-pending';
        }

        function getStatusText(status) {
            const texts = {
                'pending_responses': 'Waiting for responses',
                'has_responses': 'Responses received',
                'contractor_selected': 'Contractor selected',
                'in_progress': 'Work in progress',
                'completed': 'Completed',
                'no_responses': 'No responses yet'
            };
            return texts[status] || 'Pending';
        }

        function formatDate(date) {
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) return 'today';
            if (days === 1) return 'yesterday';
            if (days < 7) return `${days} days ago`;
            return date.toLocaleDateString();
        }

        function formatBudget(budget) {
            const budgets = {
                'under-500': 'Under $500',
                '500-1000': '$500 - $1,000',
                '1000-2500': '$1,000 - $2,500',
                '2500-5000': '$2,500 - $5,000',
                '5000-10000': '$5,000 - $10,000',
                'over-10000': 'Over $10,000',
                'flexible': 'Flexible'
            };
            return budgets[budget] || budget;
        }

        // Action functions
        function toggleResponses(jobId) {
            const responsesList = document.getElementById(`responses_${jobId}`);
            const isHidden = responsesList.style.display === 'none';
            responsesList.style.display = isHidden ? 'block' : 'none';
        }

        function selectContractor(jobId, contractorId) {
            const confirmed = confirm('Are you sure you want to hire this contractor? This will notify them and begin the project setup process.');
            if (confirmed) {
                alert(`Contractor selected! (Placeholder)\n\nThis would:\n1. Update job status to "contractor_selected"\n2. Send notification to contractor\n3. Set up project management tools\n4. Handle payment processing setup`);
                // In real implementation, this would update the job status in Firestore
            }
        }

        function viewContractorProfile(contractorId) {
            window.location.href = `profile.html?id=${contractorId}`;
        }

        function compareResponses(jobId) {
            const job = jobRequests.find(j => j.id === jobId);
            if (job && job.responses.length > 1) {
                alert('Comparison feature (Placeholder)\n\nThis would open a detailed comparison view showing:\n• Side-by-side contractor profiles\n• Price comparisons\n• Timeline comparisons\n• Response quality analysis');
            }
        }

        function editJob(jobId) {
            alert('Edit job request (Placeholder)\n\nThis would allow you to modify your job request details, urgency, or budget.');
        }

        function cancelJob(jobId) {
            const confirmed = confirm('Are you sure you want to cancel this job request? This will notify all contractors who have responded.');
            if (confirmed) {
                alert('Job request cancelled (Placeholder)\n\nThis would:\n1. Remove the job request\n2. Notify all responding contractors\n3. Update job status to "cancelled"');
            }
        }

        function goHome() {
            window.location.href = 'categories.html';
        }

        function goToCategories() {
            window.location.href = 'categories.html';
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            renderJobRequests();
        });
    </script>

    <style>
        .user-nav {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .job-requests-section {
            padding: 2rem 0;
        }

        .job-requests-grid {
            display: grid;
            gap: 2rem;
            margin-top: 2rem;
        }

        .job-request-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 4px solid #667eea;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .job-title h3 {
            margin: 0 0 0.5rem 0;
            color: #333;
        }

        .job-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-active { background: #d4edda; color: #155724; }
        .status-selected { background: #cce5ff; color: #004085; }
        .status-progress { background: #e2e3e5; color: #383d41; }
        .status-completed { background: #d1ecf1; color: #0c5460; }
        .status-waiting { background: #f8d7da; color: #721c24; }

        .job-date {
            color: #666;
            font-size: 0.9rem;
        }

        .job-description {
            margin-bottom: 1rem;
            color: #555;
        }

        .job-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .detail-item {
            font-size: 0.9rem;
        }

        .job-responses {
            margin-bottom: 1rem;
        }

        .responses-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .no-responses {
            color: #999;
            font-style: italic;
        }

        .responses-list {
            margin-top: 1rem;
        }

        .response-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid #28a745;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .business-name {
            display: block;
            color: #666;
            font-size: 0.85rem;
        }

        .response-meta {
            text-align: right;
        }

        .price {
            display: block;
            font-weight: bold;
            color: #28a745;
        }

        .timeline {
            display: block;
            font-size: 0.85rem;
            color: #666;
        }

        .response-content {
            margin-bottom: 1rem;
            color: #555;
        }

        .response-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        .job-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .job-header {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .response-header {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .response-meta {
                text-align: left;
            }
            
            .job-actions {
                flex-direction: column;
            }
        }
    </style>
</body>
</html>
