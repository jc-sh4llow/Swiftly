        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category');
        const subcategory = urlParams.get('subcategory');

        // Update page header
        function updatePageHeader() {
            const categoryDescriptions = {
                'kitchen': 'Kitchen remodeling and installation specialists',
                'bathroom': 'Bathroom renovation and plumbing experts',
                'plumbing': 'Professional plumbing services',
                'electrical': 'Licensed electrical contractors',
                'hvac': 'Heating, ventilation, and air conditioning specialists',
                'roofing': 'Roofing repair and installation experts',
                'flooring': 'Flooring installation and repair services',
                'windows': 'Window and door installation specialists'
            };

            const description = categoryDescriptions[subcategory] || 'Qualified professionals for your project';
            document.getElementById('categoryDescription').textContent = description;
        }

        // Render contractor cards
        function renderContractors(contractorList) {
            const grid = document.getElementById('candidatesGrid');
            grid.innerHTML = '';

            contractorList.forEach(contractor => {
                const card = document.createElement('div');
                card.className = 'contractor-card';
                
                const stars = '★'.repeat(Math.floor(contractor.rating)) + 
                             '☆'.repeat(5 - Math.floor(contractor.rating));
                
                card.innerHTML = `
                    <div class="contractor-header">
                        <div class="contractor-avatar">${contractor.name.split(' ').map(n => n[0]).join('')}</div>
                        <div class="contractor-info">
                            <h4>${contractor.name}</h4>
                            <div class="specialty">${contractor.specialty}</div>
                        </div>
                    </div>
                    <div class="rating">
                        <span class="stars">${stars}</span>
                        <span class="rating-score">${contractor.rating} (${contractor.reviewCount} reviews)</span>
                    </div>
                    <div class="contractor-description">${contractor.description}</div>
                    <div class="contractor-actions">
                        <button class="btn btn-primary" onclick="requestQuote(${contractor.id})">Request Quote</button>
                        <button class="btn btn-outline" onclick="viewProfile(${contractor.id})">View Profile</button>
                        <button class="btn btn-secondary" onclick="contactContractor('${contractor.phone}')">Contact</button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Request quote from contractor
        function requestQuote(contractorId) {
            const contractor = contractors[subcategory]?.find(c => c.id === contractorId) || 
                             contractors['default']?.find(c => c.id === contractorId);
            
            if (contractor) {
                const confirmed = confirm(`Send job request to ${contractor.name}?\n\nThis will:\n1. Send your job details to this contractor\n2. They can respond with a quote and timeline\n3. You'll receive a notification when they respond\n4. You can compare multiple responses before hiring`);
                
                if (confirmed) {
                    // Get job details from session storage or URL params
                    const urlParams = new URLSearchParams(window.location.search);
                    const category = urlParams.get('category');
                    const subcategory = urlParams.get('subcategory');
                    
                    alert(`Job request sent to ${contractor.name}!\n\nYou can track all your job requests and responses in the "My Job Requests" section.\n\n(Placeholder - would integrate with Firestore)`);
                    
                    // In real implementation, this would:
                    // 1. Create a job request in Firestore
                    // 2. Send notification to contractor
                    // 3. Update job status to "pending_response"
                    // 4. Redirect to job requests page
                    
                    // For now, redirect to job requests page
                    setTimeout(() => {
                        window.location.href = 'job-requests.html';
                    }, 2000);
                }
            }
        }

        // View contractor profile
        function viewProfile(contractorId) {
            window.location.href = `profile.html?id=${contractorId}`;
        }

        // Contact contractor (placeholder)
        function contactContractor(phone) {
            alert(`Contact: ${phone}\n\nThis is a placeholder. In the full version, this would open a messaging system or provide more contact options.`);
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            updatePageHeader();
            
            // Get contractors for the selected subcategory
            let selectedContractors = contractors[subcategory] || contractors['default'];
            
            // Sort by rating and availability
            selectedContractors = selectedContractors
                .sort((a, b) => {
                    if (a.available && !b.available) return -1;
                    if (!a.available && b.available) return 1;
                    return b.rating - a.rating;
                });
            
            renderContractors(selectedContractors);
        });
    </script>
</body>
</html>
